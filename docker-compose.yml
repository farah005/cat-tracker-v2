version: "3.9"

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: cattracker_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cattracker_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL}
      LAT_HOME: ${LAT_HOME}
      LON_HOME: ${LON_HOME}
      BACKEND_HOST: ${BACKEND_HOST}
      BACKEND_PORT: ${BACKEND_PORT}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ml_models:/app/ml_models
      - ./data:/app/data             # accès aux CSV Kaggle
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cattracker_frontend
    restart: unless-stopped
    environment:
      BACKEND_URL: ${BACKEND_URL}
      LAT_HOME: ${LAT_HOME}
      LON_HOME: ${LON_HOME}
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pgdata:
  ml_models:
